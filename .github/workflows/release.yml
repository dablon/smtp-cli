name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Get commit info
        id: info
        run: |
          echo "SHA8=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "DATE=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
      
      - name: Build for Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o smtp-cli-linux-amd64 ./cmd/smtp-cli
      
      - name: Build for Linux arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o smtp-cli-linux-arm64 ./cmd/smtp-cli
      
      - name: Build for Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o smtp-cli-windows-amd64.exe ./cmd/smtp-cli
      
      - name: Build for macOS amd64
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o smtp-cli-darwin-amd64 ./cmd/smtp-cli
      
      - name: Build for macOS arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o smtp-cli-darwin-arm64 ./cmd/smtp-cli
      
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-${{ steps.info.outputs.DATE }}-${{ steps.info.outputs.SHA8 }}
          draft: false
          generate_release_notes: true
          files: |
            smtp-cli-linux-amd64
            smtp-cli-linux-arm64
            smtp-cli-windows-amd64.exe
            smtp-cli-darwin-amd64
            smtp-cli-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
