name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          go-version-file: go.mod
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Build for Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o smtp-cli-linux-amd64 ./cmd/smtp-cli
      
      - name: Build for Linux arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o smtp-cli-linux-arm64 ./cmd/smtp-cli
      
      - name: Build for Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o smtp-cli-windows-amd64.exe ./cmd/smtp-cli
      
      - name: Build for macOS amd64
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o smtp-cli-darwin-amd64 ./cmd/smtp-cli
      
      - name: Build for macOS arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o smtp-cli-darwin-arm64 ./cmd/smtp-cli
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          files: |
            smtp-cli-linux-amd64
            smtp-cli-linux-arm64
            smtp-cli-windows-amd64.exe
            smtp-cli-darwin-amd64
            smtp-cli-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            dablon/smtp-cli:latest
            dablon/smtp-cli:${{ steps.version.outputs.VERSION }}
